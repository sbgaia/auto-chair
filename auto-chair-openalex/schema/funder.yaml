$schema: "https://json-schema.org/draft/2020-12/schema"
title: Funder
type: object
additionalProperties: false
properties:
  id:
    type: string
  alternate_titles:
    type: array
    items:
      type: string
  cited_by_count:
    type: integer
  country_code:
    type: [string, "null"]
  counts_by_year:
    type: array
    items:
      $ref: "./counts_by_year.yaml"
  created_date:
    type: string
    format: date
  display_name:
    type: string
  grants_count:
    type: integer
  homepage_url:
    type: [string, "null"]
    format: uri
  ids:
    type: object
    additionalProperties: false
    properties:
      openalex:
        type: string
      ror:
        type: [string, "null"]
      wikidata:
        type: [string, "null"]
      crossref:
        type: [string, "null"]
      doi:
        type: [string, "null"]
  roles:
    type: array
    items:
      $ref: "./organization_role.yaml"
  ror:
    type: [string, "null"]
  summary_stats:
    $ref: "./summary_stats.yaml"
  updated_date:
    type: string
    format: date-time
  works_count:
    type: integer
  x_concepts:
    type: array
    items:
      $ref: "./concept.yaml"
  doi:
    type: [string, "null"]
